<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海士町 商店紹介</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  font-family:sans-serif;
  margin:0;
  background:white;
  color:#222;
}

header{
  background:#2c6e49;
  color:white;
  text-align:center;
  padding:25px;
}

.version{
  text-align:center;
  font-size:14px;
  color:#666;
}

.search-box{
  max-width:900px;
  margin:20px auto;
  padding:0 20px;
}

.search-box input{
  width:100%;
  padding:12px;
  font-size:18px;
  border-radius:8px;
  border:1px solid #ccc;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.shop{
  margin-bottom:60px;
}

.photo img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.description{
  font-size:18px;
  line-height:1.7;
}

.map iframe{
  width:100%;
  height:40vh;
  border:0;
  border-radius:12px;
  margin-top:15px;
}

.favorite-btn{
  background:#ffd700;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.empty{
  background:#f2f2f2;
  color:#666;
  padding:40px;
  border-radius:12px;
  text-align:center;
  font-size:20px;
}

/* モーダル */
#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:999;
}

#modalContent{
  display:flex;
  overflow-x:auto;
  height:100%;
  scroll-snap-type:x mandatory;
}

.modalImage{
  min-width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:center;
}

.modalImage img{
  max-width:95%;
  max-height:95%;
}

.close{
  position:absolute;
  top:15px;
  right:20px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  padding:10px;
}

.left{ left:10px; }
.right{ right:10px; }

</style>
</head>

<body>

<header>
<h1>海士町 商店紹介</h1>
<div class="version">V3.0.0</div>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="検索（漢字・ひらがなOK）">
</div>

<div class="container" id="shopList"></div>

<!-- モーダル -->
<div id="modal">
<div class="close" onclick="closeModal()">×</div>
<div class="arrow left" id="leftArrow" onclick="move(-1)">‹</div>
<div class="arrow right" id="rightArrow" onclick="move(1)">›</div>
<div id="modalContent"></div>
</div>

<script>

const API_KEY="KreHOkHj6EARBhfMoBtGdszqZ1xVgQSp1Htq";
const API_URL="https://amatownshops.microcms.io/api/v1/shops";

let allShops=[];
let images=[];
let currentIndex=0;

/* お気に入り */
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");

fetch(API_URL,{
headers:{
"X-MICROCMS-API-KEY":API_KEY
}
})
.then(res=>res.json())
.then(data=>{

allShops=data.contents;

/* ソート（kana1優先） */
allShops.sort((a,b)=>{
return (a.kana1||a.name).localeCompare((b.kana1||b.name),'ja');
});

render(allShops);

});

function render(list){

const container=document.getElementById("shopList");
container.innerHTML="";

if(list.length===0){
container.innerHTML='<div class="empty">該当なし</div>';
return;
}

list.forEach(shop=>{

const isFav=favorites.includes(shop.id);

container.innerHTML+=`

<div class="shop">

<h2>${shop.name}</h2>

<button class="favorite-btn" onclick="toggleFav('${shop.id}')">
${isFav ? "★ お気に入り済み" : "☆ お気に入り"}
</button>

<div class="photo">
<img src="${shop.image1?.url||""}" onclick='openModal(["${shop.image1?.url||""}","${shop.image2?.url||""}"],0)'>
<img src="${shop.image2?.url||""}" onclick='openModal(["${shop.image1?.url||""}","${shop.image2?.url||""}"],1)'>
</div>

<p class="description">
${(shop.description||"").replace(/\n/g,"<br>")}
</p>

<div class="map">
${shop.map||""}
</div>

</div>

`;

});

}

/* 検索（5個ふりがな対応） */
document.getElementById("search").addEventListener("input",function(){

const key=this.value.toLowerCase();

const filtered=allShops.filter(s=>{

const names=(s.name||"").toLowerCase();

const kanas=[
s.kana1,s.kana2,s.kana3,s.kana4,s.kana5
].map(k=> (k||"").toLowerCase());

return names.includes(key) || kanas.some(k=>k.includes(key));

});

render(filtered);

});

/* お気に入り */
function toggleFav(id){

if(favorites.includes(id)){
favorites=favorites.filter(f=>f!==id);
}else{
favorites.push(id);
}

localStorage.setItem("favorites",JSON.stringify(favorites));
render(allShops);
}

/* モーダル */
function openModal(imgs,index){

images=imgs.filter(i=>i);
currentIndex=index;

const modal=document.getElementById("modal");
const content=document.getElementById("modalContent");

content.innerHTML="";

images.forEach(src=>{
content.innerHTML+=`<div class="modalImage"><img src="${src}"></div>`;
});

/* 矢印制御 */
const l=document.getElementById("leftArrow");
const r=document.getElementById("rightArrow");

if(images.length<=1){
l.style.display="none";
r.style.display="none";
}else{
l.style.display="block";
r.style.display="block";
}

modal.style.display="block";
scrollToIndex();
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function move(d){
currentIndex+=d;
if(currentIndex<0)currentIndex=0;
if(currentIndex>=images.length)currentIndex=images.length-1;
scrollToIndex();
}

function scrollToIndex(){
const c=document.getElementById("modalContent");
c.scrollTo({left:c.clientWidth*currentIndex,behavior:"smooth"});
}

</script>

</body>
</html>
