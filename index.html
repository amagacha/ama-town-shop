<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海士町 商店紹介</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  font-family:sans-serif;
  margin:0;
  background:white;
  color:#222;
}

header{
  background:#2c6e49;
  color:white;
  text-align:center;
  padding:25px;
}

/* 検索バー */
.search-box{
  max-width:900px;
  margin:20px auto;
  padding:0 20px;
}

.search-box input{
  width:100%;
  padding:12px;
  font-size:18px;
  border-radius:8px;
  border:1px solid #ccc;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.shop{
  margin-bottom:60px;
}

.photo img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

.description{
  font-size:18px;
  line-height:1.7;
}

.map iframe{
  width:100%;
  height:40vh;
  border:0;
  border-radius:12px;
  margin-top:15px;
}

.empty{
  background:#f2f2f2;
  color:#666;
  padding:40px;
  border-radius:12px;
  text-align:center;
  font-size:20px;
}

.version{
  position:fixed;
  top:10px;
  right:15px;
  background:rgba(0,0,0,0.08);
  padding:5px 10px;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="version">V2.4.0</div>

<header>
<h1>海士町 商店紹介</h1>
</header>

<!-- 検索 -->
<div class="search-box">
<input type="text" id="search" placeholder="店名で検索（ひらがなOK）">
</div>

<div class="container" id="shopList">
<div class="empty">店がまだ登録されていません</div>
</div>

<script>

const API_KEY = "KreHOkHj6EARBhfMoBtGdszqZ1xVgQSp1Htq";
const API_URL = "https://amatownshops.microcms.io/api/v1/shops";

let allShops = [];

/* =========================
   データ取得
========================= */

fetch(API_URL,{
headers:{
"X-MICROCMS-API-KEY":API_KEY
}
})
.then(res=>res.json())
.then(data=>{

allShops = data.contents;

/* あいうえお順（ふりがな優先） */
allShops.sort((a,b)=>{
return (a.kana || a.name)
.localeCompare((b.kana || b.name),'ja');
});

render(allShops);

});

/* =========================
   表示
========================= */

function render(list){

const container=document.getElementById("shopList");
container.innerHTML="";

if(list.length===0){
container.innerHTML='<div class="empty">該当する店舗がありません</div>';
return;
}

list.forEach(shop=>{

container.innerHTML+=`

<div class="shop">

<h2>${shop.name}</h2>

<div class="photo">
<img src="${shop.image1.url}">
<img src="${shop.image2.url}">
</div>

<p class="description">
${shop.description.replace(/\n/g,"<br>")}
</p>

<div class="map">
${shop.map}
</div>

</div>

`;

});

}

/* =========================
   検索
========================= */

document.getElementById("search").addEventListener("input",function(){

const keyword = this.value.toLowerCase();

/* フィルター */
const filtered = allShops.filter(shop=>{

const name = shop.name.toLowerCase();
const kana = (shop.kana || "").toLowerCase();

return name.includes(keyword) || kana.includes(keyword);

});

render(filtered);

});

</script>

</body>
</html>
