<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>海士町 商店紹介</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{font-family:sans-serif;margin:0;background:white;}

header{
  background:#2c6e49;
  color:white;
  text-align:center;
  padding:25px;
}

.version{
  text-align:center;
  font-size:14px;
  color:#666;
}

/* 👀 サイト閲覧数 */
.site-view{
  text-align:center;
  font-size:16px;
  padding:10px;
  background:#f5f5f5;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.shop{margin-bottom:60px;}

.photo img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

.map iframe{
  width:100%;
  height:40vh;
  border-radius:12px;
}

</style>
</head>

<body>

<header>
<h1>海士町 商店紹介</h1>
<div class="version">V3.5</div>
</header>

<!-- 👇 ここ追加 -->
<div class="site-view" id="siteView"></div>

<div id="shopList" class="container"></div>

<script>

const API_KEY="KreHOkHj6EARBhfMoBtGdszqZ1xVgQSp1Htq";
const API_URL="https://amatownshops.microcms.io/api/v1/shops";

/* 👀 サイト閲覧 */
let totalViews=parseInt(localStorage.getItem("siteViews")||"0");
let todayData=JSON.parse(localStorage.getItem("siteToday")||"{}");
let sessionFlag=sessionStorage.getItem("visited");

/* 今日の日付 */
const today=new Date().toISOString().slice(0,10);

/* 日付チェック */
if(todayData.date!==today){
todayData={date:today,count:0};
}

/* カウント（初回のみ） */
if(!sessionFlag){
totalViews++;
todayData.count++;

localStorage.setItem("siteViews",totalViews);
localStorage.setItem("siteToday",JSON.stringify(todayData));
sessionStorage.setItem("visited","true");
}

/* 表示 */
document.getElementById("siteView").innerHTML=
`👀 総閲覧数：${totalViews}回　｜　📅 今日：${todayData.count}回`;

/* データ取得 */
fetch(API_URL,{
headers:{"X-MICROCMS-API-KEY":API_KEY}
})
.then(r=>r.json())
.then(data=>{
render(data.contents);
});

function render(list){

const el=document.getElementById("shopList");
el.innerHTML="";

list.forEach(s=>{

el.innerHTML+=`

<div class="shop">

<h2>${s.name}</h2>

<div class="photo">
<img src="${s.image1?.url||""}">
<img src="${s.image2?.url||""}">
</div>

<p>${(s.description||"").replace(/\n/g,"<br>")}</p>

<div class="map">${s.map||""}</div>

</div>

`;

});

}

</script>

</body>
</html>
